<script>
	function secondHighest(arr) {
		// your sorting (unchanged)
		for(let i=0;i<arr.length;i++){
			for(let k=i+1;k<arr.length;k++){
				if(arr[i]<arr[k]){
					let temp = arr[i];
					arr[i]=arr[k];
					arr[k]=temp;
				}
			}
		}

		// ✅ handle edge case: empty or 1 element
		if(arr.length < 2) return -Infinity;

		// ✅ find second DISTINCT element
		let first = arr[0];

		for(let i = 1; i < arr.length; i++){
			if(arr[i] !== first){
				return arr[i]; // second highest
			}
		}

		// ✅ if all elements same
		return -Infinity;
	}

	function Main() {
		var n = Number(prompt("Enter the number of elements"));
		var arr = [];

		for (var i = 0; i < n; i++) {
			arr[i] = Number(prompt("Enter element " + (i+1)));
		}

		alert(secondHighest(arr));
	}

	Main();
</script>

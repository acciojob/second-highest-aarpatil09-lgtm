<script>
	function secondHighest(arr) {
		for(let i = 0; i < arr.length; i++){
			for(let k = i + 1; k < arr.length; k++){
				if(arr[i] < arr[k]){
					let temp = arr[i];
					arr[i] = arr[k];
					arr[k] = temp;
				}
			}
		}
		return arr[1];
	}

	function Main() {
		var n = Number(prompt("Enter the number of elements"));
		var arr = [];

		for (var i = 0; i < n; i++) {
			arr[i] = Number(prompt("Enter element " + (i+1))); // ✅ fixed
		}

		alert(secondHighest(arr));
	}

	Main();
</script>
